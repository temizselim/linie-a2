<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<title>Linie A2, Berlin Macerası</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#12141F;
  --panel:#1C1F2E;
  --panel2:#252A3D;
  --edge:#31374E;
  --ink:#F3EFE2;
  --muted:#9AA0B6;
  --gelb:#F5CB1C;
  --gelb-ink:#191204;
  --ok:#43C778;
  --bad:#E4574D;
  --acc:#F5CB1C;
  --r:14px;
  --disp:'Archivo Black', system-ui, -apple-system, sans-serif;
  --body:'Archivo', system-ui, -apple-system, 'Segoe UI', sans-serif;
  --mono:ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--body);
  font-size:16px;
  line-height:1.5;
  background-image:radial-gradient(circle at 15% 0%, #1B2138 0%, transparent 45%),
                   radial-gradient(circle at 90% 100%, #201A2E 0%, transparent 40%);
  background-attachment:fixed;
}
.app{max-width:680px;margin:0 auto;height:100%;display:flex;flex-direction:column;overflow:hidden}

/* ---------- HUD ---------- */
.hud{
  position:sticky;top:0;z-index:50;
  background:var(--gelb);color:var(--gelb-ink);
  padding:10px 14px 8px;
  border-bottom:4px solid #0E0F17;
}
.hud-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.hud-brand{font-family:var(--disp);font-size:15px;letter-spacing:.04em;display:flex;align-items:center;gap:8px;white-space:nowrap}
.hud-brand .badge-line{
  background:#0E0F17;color:var(--gelb);border-radius:6px;
  padding:1px 8px;font-family:var(--disp);font-size:14px;
}
.hud-stats{display:flex;gap:8px;align-items:center;font-family:var(--mono);font-size:13px;font-weight:700}
.hud-stat{background:rgba(14,15,23,.12);border-radius:8px;padding:2px 8px;white-space:nowrap}
.xp-wrap{display:flex;align-items:center;gap:8px;margin-top:7px}
.xp-label{font-family:var(--mono);font-size:11px;font-weight:700;white-space:nowrap}
.xp-bar{flex:1;height:8px;background:rgba(14,15,23,.22);border-radius:99px;overflow:hidden}
.xp-fill{height:100%;background:#0E0F17;border-radius:99px;transition:width .5s ease}

/* ---------- LAYOUT ---------- */
main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 14px 24px;overscroll-behavior:contain}
.eyebrow{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
h1{font-family:var(--disp);font-size:26px;line-height:1.15;margin:4px 0 6px}
h2{font-family:var(--disp);font-size:19px;margin:2px 0 4px}
.sub{color:var(--muted);font-size:14.5px}
.card{background:var(--panel);border:1px solid var(--edge);border-radius:var(--r);padding:16px;margin-top:14px}
.card.tight{padding:12px 14px}

/* ---------- TRANSIT MAP ---------- */
.map-head{margin-bottom:6px}
.line-strip{position:relative;margin-top:18px;padding-left:34px}
.line-strip::before{
  content:"";position:absolute;left:13px;top:26px;bottom:26px;width:8px;
  background:linear-gradient(#F5CB1C,#E4574D 20%,#3E8DDD 45%,#43C778 70%,#B06CE0 100%);
  border-radius:99px;opacity:.9;
}
.station{position:relative;margin-bottom:14px}
.station-dot{
  position:absolute;left:-34px;top:20px;width:34px;height:34px;border-radius:50%;
  background:#0E0F17;border:4px solid var(--lc,#888);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--disp);font-size:13px;color:#fff;
}
.station-card{
  background:var(--panel);border:1px solid var(--edge);border-radius:var(--r);
  padding:13px 14px;cursor:pointer;transition:transform .12s ease,border-color .12s;
  border-left:5px solid var(--lc,#888);
}
.station-card:active{transform:scale(.985)}
.station-card.locked{opacity:.45;cursor:not-allowed;filter:grayscale(.7)}
.st-row{display:flex;align-items:center;gap:12px}
.st-emoji{font-size:30px;flex-shrink:0}
.st-name{font-family:var(--disp);font-size:16px}
.st-theme{font-size:13px;color:var(--muted)}
.pips{display:flex;gap:5px;margin-top:8px}
.pip{flex:1;height:6px;border-radius:99px;background:var(--panel2)}
.pip.on{background:var(--lc,var(--ok))}
.st-done{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ok);margin-top:6px}

/* ---------- BUTTONS ---------- */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  border:none;border-radius:12px;cursor:pointer;
  font-family:var(--body);font-weight:700;font-size:15.5px;
  padding:13px 18px;transition:transform .1s ease,filter .15s;
  color:var(--gelb-ink);background:var(--gelb);width:100%;
}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--edge)}
.btn.small{width:auto;padding:8px 14px;font-size:13.5px;border-radius:10px}
.btn.opt{
  background:var(--panel2);color:var(--ink);border:1px solid var(--edge);
  justify-content:flex-start;text-align:left;font-weight:500;margin-top:9px;font-size:15.5px;
}
.btn.opt.right{background:#1D3327;border-color:var(--ok);color:#CFF3DC}
.btn.opt.wrong{background:#392223;border-color:var(--bad);color:#F6CDC9;animation:shake .3s}
.btn-row{display:flex;gap:10px;margin-top:14px}
.btn-row .btn{flex:1}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* ---------- STEP LIST (district) ---------- */
.step{
  display:flex;align-items:center;gap:12px;background:var(--panel);
  border:1px solid var(--edge);border-radius:var(--r);padding:14px;margin-top:10px;cursor:pointer;
}
.step:active{transform:scale(.985)}
.step.locked{opacity:.45;cursor:not-allowed}
.step.done{border-color:var(--ok)}
.step-ico{width:42px;height:42px;border-radius:12px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.step-name{font-weight:700;font-size:15.5px}
.step-desc{font-size:13px;color:var(--muted)}
.step-check{margin-left:auto;font-size:18px}

/* ---------- QUIZ ---------- */
.q-progress{display:flex;gap:4px;margin-bottom:14px}
.q-seg{flex:1;height:5px;border-radius:99px;background:var(--panel2)}
.q-seg.on{background:var(--gelb)}
.q-seg.err{background:var(--bad)}
.q-text{font-size:19px;font-weight:600;line-height:1.4}
.q-tr{color:var(--muted);font-size:14px;margin-top:4px}
.explain{
  margin-top:12px;padding:11px 13px;border-radius:11px;font-size:14px;
  background:var(--panel2);border-left:4px solid var(--gelb);
}
.explain.good{border-left-color:var(--ok)}
.explain.badx{border-left-color:var(--bad)}

/* word chips */
.chips,.answer-line{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;min-height:46px}
.answer-line{background:var(--panel2);border:1px dashed var(--edge);border-radius:11px;padding:8px}
.chip{
  background:var(--panel2);border:1px solid var(--edge);color:var(--ink);
  border-radius:10px;padding:8px 13px;font-size:15.5px;cursor:pointer;font-weight:500;
}
.answer-line .chip{background:#3A3312;border-color:var(--gelb)}
.chip:active{transform:scale(.94)}

/* ---------- VOCAB ---------- */
.v-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.v-card{background:var(--panel);border:1px solid var(--edge);border-radius:12px;padding:11px 12px}
.v-de{font-weight:700;font-size:15px}
.v-tr{color:var(--muted);font-size:13px}
.v-ex{font-size:12.5px;color:#C9CDDC;margin-top:5px;font-style:italic}
.spk{background:none;border:none;cursor:pointer;font-size:15px;padding:2px 4px}
.match-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.m-btn{
  background:var(--panel2);border:1px solid var(--edge);color:var(--ink);border-radius:11px;
  padding:12px 8px;font-size:14.5px;cursor:pointer;font-weight:500;width:100%;margin-bottom:8px;
}
.m-btn.sel{border-color:var(--gelb);background:#3A3312}
.m-btn.hit{border-color:var(--ok);background:#1D3327;opacity:.55;pointer-events:none}
.m-btn.miss{border-color:var(--bad);animation:shake .3s}

/* ---------- DIALOGUE ---------- */
.bubble{max-width:88%;padding:12px 14px;border-radius:16px;margin-top:12px;font-size:15.5px;position:relative}
.bubble.npc{background:var(--panel2);border:1px solid var(--edge);border-bottom-left-radius:5px}
.bubble.me{background:#3A3312;border:1px solid var(--gelb);margin-left:auto;border-bottom-right-radius:5px}
.bubble .who{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.08em;margin-bottom:3px}
.bubble .tr-line{color:var(--muted);font-size:13px;margin-top:5px;border-top:1px dashed var(--edge);padding-top:5px}

/* ---------- BATTLE ---------- */
.arena{background:var(--panel);border:1px solid var(--edge);border-radius:var(--r);padding:16px;margin-top:12px;text-align:center}
.boss-emoji{font-size:64px;line-height:1;display:inline-block}
.boss-emoji.hit{animation:bosshit .35s}
@keyframes bosshit{0%{transform:scale(1)}30%{transform:scale(.85) rotate(-7deg);filter:brightness(2)}100%{transform:scale(1)}}
.boss-name{font-family:var(--disp);font-size:17px;margin-top:6px}
.taunt{color:var(--muted);font-style:italic;font-size:13.5px;margin-top:3px}
.hp-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.hp-label{font-family:var(--mono);font-size:11px;font-weight:700;width:52px;text-align:left}
.hp-bar{flex:1;height:14px;background:var(--panel2);border-radius:8px;overflow:hidden;border:1px solid var(--edge)}
.hp-fill{height:100%;border-radius:7px;transition:width .4s ease}
.hp-fill.boss{background:linear-gradient(90deg,#E4574D,#F08A3C)}
.hp-fill.mine{background:linear-gradient(90deg,#43C778,#9ADB4F)}
.combo{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--gelb);margin-top:8px;min-height:16px}
.items-row{display:flex;gap:8px;margin-top:12px}
.item-btn{
  flex:1;background:var(--panel2);border:1px solid var(--edge);color:var(--ink);
  border-radius:11px;padding:8px 6px;cursor:pointer;font-size:12.5px;font-weight:600;
}
.item-btn:disabled{opacity:.35}
.dmg-float{position:absolute;font-family:var(--disp);font-size:22px;color:var(--gelb);animation:floatup .8s forwards;pointer-events:none}
@keyframes floatup{to{transform:translateY(-40px);opacity:0}}

/* ---------- SHOP / DICT / ACH ---------- */
.shop-item{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--edge);border-radius:var(--r);padding:13px;margin-top:10px}
.shop-emoji{font-size:30px}
.shop-info{flex:1}
.shop-name{font-weight:700;font-size:15px}
.shop-desc{font-size:12.5px;color:var(--muted)}
.own{font-family:var(--mono);font-size:11px;color:var(--gelb);font-weight:700}
.dict-row{display:flex;align-items:baseline;gap:8px;padding:9px 4px;border-bottom:1px solid var(--edge);font-size:15px}
.dict-row .v-tr{margin-left:auto;text-align:right}
.search{width:100%;background:var(--panel);border:1px solid var(--edge);color:var(--ink);border-radius:11px;padding:11px 14px;font-size:15px;font-family:var(--body);margin-top:12px}
.search:focus{outline:2px solid var(--gelb)}
.ach{display:flex;gap:12px;align-items:center;background:var(--panel);border:1px solid var(--edge);border-radius:var(--r);padding:12px;margin-top:10px}
.ach.off{opacity:.4;filter:grayscale(1)}
.ach-emoji{font-size:26px}
.ach-name{font-weight:700;font-size:14.5px}
.ach-desc{font-size:12.5px;color:var(--muted)}

/* ---------- TABS ---------- */
.tabs{
  flex:0 0 auto;z-index:50;
  background:#0E0F17;border-top:1px solid var(--edge);
  display:flex;justify-content:center;
  padding-bottom:env(safe-area-inset-bottom);
}
.tabs-inner{display:flex;max-width:680px;width:100%}
.tab{
  flex:1;background:none;border:none;color:var(--muted);cursor:pointer;
  padding:9px 2px calc(9px + env(safe-area-inset-bottom));font-family:var(--body);
  font-size:10.5px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:2px;
}
.tab .t-ico{font-size:20px}
.tab.active{color:var(--gelb)}

/* ---------- MISC ---------- */
.toast{
  position:fixed;top:74px;left:50%;transform:translateX(-50%) translateY(-8px);
  background:#0E0F17;color:var(--gelb);border:1px solid var(--gelb);
  padding:10px 18px;border-radius:12px;font-weight:700;font-size:14px;z-index:99;
  opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:92vw;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.reward-box{text-align:center;padding:26px 16px}
.reward-emoji{font-size:56px}
.reward-nums{font-family:var(--mono);font-weight:700;color:var(--gelb);margin-top:8px;font-size:15px}
.back{background:none;border:none;color:var(--muted);font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.1em;padding:4px 0;margin-bottom:6px}
.center{text-align:center}
.mt{margin-top:14px}
.hr{border:none;border-top:1px solid var(--edge);margin:14px 0}
table.gr{width:100%;border-collapse:collapse;margin:10px 0;font-size:14px}
table.gr td,table.gr th{border:1px solid var(--edge);padding:6px 9px;text-align:left}
table.gr th{background:var(--panel2);font-family:var(--mono);font-size:12px}
.g-ex{background:var(--panel2);border-radius:10px;padding:9px 12px;margin-top:8px;font-size:14.5px}
.g-ex .tr{color:var(--muted);font-size:13px}
.hl{color:var(--gelb);font-weight:700}
.danger{color:var(--bad)}
@media (max-width:420px){
  .v-grid{grid-template-columns:1fr}
  .hud-stats{font-size:12px;gap:5px}
  h1{font-size:23px}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none !important;transition:none !important}
}
.timer{height:6px;background:var(--panel2);border-radius:3px;margin-bottom:12px;overflow:hidden}
.timer-fill{height:100%;width:100%;background:var(--gelb);border-radius:3px;transition:width .1s linear}
.timer-fill.low{background:var(--bad)}
.gap-input{margin:10px 0 4px;font-size:17px}
.play-big{display:block;width:100%;margin:10px 0;padding:14px;border-radius:12px;border:1px solid var(--edge);background:var(--panel2);color:var(--text);font-family:var(--disp);font-size:16px;cursor:pointer}
.play-big:active{transform:scale(.98)}
.dekb{display:flex;gap:6px;margin:8px 0}
.dekb-k{flex:1;padding:10px 0;border-radius:10px;border:1px solid var(--edge);background:var(--panel2);color:var(--text);font-size:17px;font-weight:600;cursor:pointer}
.dekb-k:active{background:var(--edge)}
.pack{background:var(--panel);border:1px solid var(--edge);border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer}
.pack-top{display:flex;align-items:center;gap:10px}
.pack-emoji{font-size:24px}
.pack-name{font-weight:600}
.pack-n{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--muted)}
.pack .bar{height:6px;background:var(--panel2);border-radius:3px;margin-top:8px;overflow:hidden}
.pack .bar i{display:block;height:100%;background:var(--gelb)}
.tr-stats{display:flex;gap:8px;margin:10px 0}
.tr-stat{flex:1;background:var(--panel);border:1px solid var(--edge);border-radius:12px;padding:10px;text-align:center}
.tr-stat b{font-size:20px;display:block;font-family:var(--disp)}
.tr-stat span{font-size:11px;color:var(--muted)}
.read-card{background:var(--panel);border:1px solid var(--edge);border-radius:14px;padding:14px;margin:10px 0;max-height:44vh;overflow-y:auto}
.read-kind{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gelb);margin-bottom:6px}
.read-title{font-weight:700;margin-bottom:8px}
.mail-head{font-size:12.5px;color:var(--muted);border-bottom:1px solid var(--edge);padding-bottom:8px;margin-bottom:10px;line-height:1.5}
.read-body p{margin:0 0 9px;font-size:15px;line-height:1.55}
.read-body p:last-child{margin-bottom:0}
.warea{width:100%;box-sizing:border-box;min-height:130px;background:var(--panel2);border:1px solid var(--edge);border-radius:12px;color:var(--text);padding:12px;font:inherit;font-size:15.5px;line-height:1.5;resize:vertical}
.warea:focus{outline:2px solid var(--gelb)}
.wcount{font-family:var(--mono);font-size:11.5px;color:var(--muted);text-align:right;margin-top:4px}
.dw{margin-top:8px;font-size:15px;line-height:1.9}
.dw .lab{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;color:var(--muted);display:block}
.dw span.tok{padding:1px 4px;border-radius:5px;margin-right:2px;display:inline-block}
.dw .tok.ok{background:rgba(67,199,120,.16);color:var(--ok)}
.dw .tok.bad{background:rgba(228,87,77,.16);color:var(--bad)}
.score-big{font-family:var(--disp);font-size:40px;text-align:center;margin:4px 0}
.err-row{background:var(--panel2);border:1px solid var(--edge);border-radius:10px;padding:9px 11px;margin-bottom:7px;font-size:14px;line-height:1.5}
.err-row b.o{color:var(--bad);text-decoration:line-through}
.err-row b.f{color:var(--ok)}
.punkt{display:flex;gap:8px;align-items:flex-start;margin:5px 0;font-size:14.5px}
.svgwrap{background:var(--panel);border:1px solid var(--edge);border-radius:14px;padding:6px;margin:10px 0}
.pic-q{font-size:54px;text-align:center;margin-bottom:6px;line-height:1.1}
.diag-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--panel2)}
.diag-row:last-child{border-bottom:none}
.diag-name{flex:0 0 34%;font-size:13.5px}
.diag-bar{flex:1;height:8px;background:var(--panel2);border-radius:4px;overflow:hidden}
.diag-bar i{display:block;height:100%;border-radius:4px}
.diag-pct{flex:0 0 44px;text-align:right;font-family:var(--mono);font-size:12px;color:var(--muted)}
.grade{font-family:var(--disp);font-size:44px;text-align:center}
.sec-note{font-family:var(--mono);font-size:13px;color:var(--gelb);text-align:right;margin:4px 0}
.tilegrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.tile{background:var(--panel);border:1px solid var(--edge);border-radius:12px;padding:11px;cursor:pointer}
.tile b{display:block;font-size:13.5px;margin-bottom:2px}
.tile span{font-size:11.5px;color:var(--muted);line-height:1.35}
.chatbox{display:flex;flex-direction:column;gap:8px;margin:10px 0}
.bub{max-width:82%;padding:9px 12px;border-radius:14px;font-size:14.5px;line-height:1.45}
.bub.emma{background:var(--panel);border:1px solid var(--edge);align-self:flex-start;border-bottom-left-radius:4px}
.bub.me{background:#2E3A2E;border:1px solid #3E5A3E;align-self:flex-end;border-bottom-right-radius:4px}
.bub .fixrow{margin-top:6px;padding-top:6px;border-top:1px dashed var(--edge);font-size:12.5px;color:var(--gelb)}
.frame{border:5px double #B99B5B;border-radius:6px;background:#20263C;padding:10px;margin-top:8px}
.frame .plaque{font-family:var(--mono);font-size:11px;color:#B99B5B;margin-top:6px}
.kchart{background:var(--panel);border:1px solid var(--edge);border-radius:12px;padding:10px;margin-top:8px}
.wk-row{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12.5px;padding:6px 0;border-bottom:1px solid var(--panel2)}
.wk-row:last-child{border-bottom:none}
</style>
</head>
<body>
<div class="app">
  <header class="hud" id="hud"></header>
  <main id="view"></main>
  <nav class="tabs"><div class="tabs-inner" id="tabs"></div></nav>
</div>
<div class="toast" id="toast"></div>
<script>
"use strict";
/* =============== YARDIMCILAR =============== */
const $ = s => document.querySelector(s);
function uiTop() { const v = $("#view"); if (v) v.scrollTop = 0; try { window.scrollTo(0, 0); } catch (e) {} }
function uiBottom() { const v = $("#view"); if (v) v.scrollTop = v.scrollHeight; }
const el = (tag, cls, html) => { const e = document.createElement(tag); if (cls) e.className = cls; if (html !== undefined) e.innerHTML = html; return e; };
const shuffle = a => { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };
const todayStr = () => new Date().toISOString().slice(0, 10);

function speak(text, o, keepQueue) {
  try {
    if (!keepQueue) speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text.replace(/^(der|die|das) /i, "$1 "));
    u.lang = "de-DE"; u.rate = (o && o.rate) || 0.88; u.pitch = (o && o.pitch) || 1;
    const v = speechSynthesis.getVoices().find(v => v.lang && v.lang.toLowerCase().startsWith("de"));
    if (v) u.voice = v;
    speechSynthesis.speak(u);
  } catch (e) {}
}
function speakDialog(lines) {
  try { speechSynthesis.cancel(); } catch (e) {}
  lines.forEach((l, k) => speak(l.de, { pitch: l.sp ? 1.22 : 0.92, rate: 0.86 }, k > 0));
}
if ("speechSynthesis" in window) { speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices(); }

let AC = null;
function blip(kind) {
  try {
    AC = AC || new (window.AudioContext || window.webkitAudioContext)();
    const seq = kind === "ok" ? [[660, 0, .07], [880, .08, .1]] :
                kind === "bad" ? [[220, 0, .16]] :
                kind === "win" ? [[523, 0, .12], [659, .13, .12], [784, .26, .12], [1047, .39, .22]] :
                [[440, 0, .06]];
    seq.forEach(([f, t, d]) => {
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = "triangle"; o.frequency.value = f;
      g.gain.setValueAtTime(.06, AC.currentTime + t);
      g.gain.exponentialRampToValueAtTime(.001, AC.currentTime + t + d);
      o.connect(g); g.connect(AC.destination);
      o.start(AC.currentTime + t); o.stop(AC.currentTime + t + d + .02);
    });
  } catch (e) {}
}

let toastTimer = null;
function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
function toast(msg) {
  const t = $("#toast"); t.innerHTML = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
}

const spkBtn = txt => `<button class="spk" data-say="${String(txt).replace(/"/g, "&quot;")}" onclick="speak(this.dataset.say)" aria-label="dinle">🔊</button>`;

function kbHTML(targetId) {
  const keys = [["ä", "Ä"], ["ö", "Ö"], ["ü", "Ü"]];
  return `<div class="dekb">
    ${keys.map(k => `<button class="dekb-k" data-l="${k[0]}" data-u="${k[1]}" onpointerdown="event.preventDefault()" onclick="kbIns('${targetId}', this)">${k[0]}</button>`).join("")}
    <button class="dekb-k" onpointerdown="event.preventDefault()" onclick="kbIns('${targetId}', this)">ß</button>
    <button class="dekb-k" onpointerdown="event.preventDefault()" onclick="kbShift(this)">⇧</button>
  </div>`;
}
function kbIns(t, el) {
  const inp = document.getElementById(t);
  if (!inp || inp.disabled) return;
  const ch = el.textContent;
  const s = inp.selectionStart ?? inp.value.length, e = inp.selectionEnd ?? s;
  inp.value = inp.value.slice(0, s) + ch + inp.value.slice(e);
  inp.focus();
  try { inp.setSelectionRange(s + 1, s + 1); } catch (err) {}
  const wc = document.getElementById("wCount");
  if (wc && inp.tagName === "TEXTAREA") wc.textContent = wCountOf(inp.value) + " kelime";
}
function kbShift(btn) {
  const kb = btn.closest(".dekb");
  kb.classList.toggle("up");
  const up = kb.classList.contains("up");
  kb.querySelectorAll(".dekb-k[data-l]").forEach(k => { k.textContent = up ? k.dataset.u : k.dataset.l; });
  btn.textContent = up ? "⇩" : "⇧";
}

/* =============== SERT YAZIM KONTROLÜ =============== */
function analyzeAnswer(input, answers) {
  const p = s => String(s).replace(/[.,!?;:„“”"'’]/g, "").replace(/\s+/g, " ").trim();
  const v = p(input);
  for (const a of answers) if (v === p(a)) return { ok: true };
  for (const a of answers) {
    if (v.toLowerCase() === p(a).toLowerCase()) {
      const a0 = p(a);
      const capNote = a0[0] === a0[0].toUpperCase()
        ? "Almancada isimler ve cümle başı her zaman büyük harfle başlar."
        : "Bu kelime burada küçük harfle yazılır.";
      return { ok: false, kind: "gross", note: `Kelimeler doğru ama büyük küçük harf hatası var. ${capNote} Senin yazdığın: "${esc(String(input).trim())}"` };
    }
  }
  const f = s => s.toLowerCase().replace(/ä/g, "ae").replace(/ö/g, "oe").replace(/ü/g, "ue").replace(/ß/g, "ss");
  const g = s => s.toLowerCase().replace(/ä/g, "a").replace(/ö/g, "o").replace(/ü/g, "u").replace(/ß/g, "ss");
  for (const a of answers) {
    if (f(v) === f(p(a)) || g(v) === g(p(a))) return { ok: false, kind: "umlaut", note: `Çok yakın ama umlaut veya ß farkı var. Bu fark Almancada anlamı değiştirebilir (schon = çoktan, schön = güzel). Senin yazdığın: "${esc(String(input).trim())}". Klavye çubuğundaki ä ö ü ß tuşlarını kullan.` };
  }
  return { ok: false };
}

/* =============== SRS MOTORU =============== */
const SRS_IV = [0, 1, 3, 7, 14, 30];
function plusDays(n) { const d = new Date(); d.setDate(d.getDate() + n); return d.toISOString().slice(0, 10); }
let WORDS = new Map();
function buildWords() {
  WORDS = new Map();
  DATA.forEach(d => d.vocab.forEach(w => { if (!WORDS.has(w.de)) WORDS.set(w.de, { de: w.de, tr: w.tr, pool: "d:" + d.id }); }));
  PACKS.forEach(p => p.words.forEach(w => { if (!WORDS.has(w.de)) WORDS.set(w.de, { de: w.de, tr: w.tr, pool: "p:" + p.id }); }));
}
function dueWords() {
  const t = todayStr();
  return Object.keys(S.srs).filter(k => S.srs[k].due <= t).map(k => WORDS.get(k)).filter(Boolean);
}
function packDistractors(w, n) {
  const pool = [...WORDS.values()].filter(x => x.de !== w.de && x.tr !== w.tr);
  const same = pool.filter(x => x.pool === w.pool);
  return shuffle(same.length >= n ? same : pool).slice(0, n);
}
function makeSrsQ(w) { return srsTag(makeSrsQRaw(w)); }
function makeSrsQRaw(w) {
  const lvl = (S.srs[w.de] || { lvl: 0 }).lvl;
  const art = /^(der|die|das) (.+)$/.exec(w.de);
  const emo = EMOJI[w.de];
  let modes;
  if (lvl <= 1) modes = emo ? ["mc", "picmc"] : ["mc"];
  else if (lvl === 2) modes = (art ? ["type", "artikel"] : ["type", "mc"]).concat(emo ? ["pictype"] : []);
  else modes = (art ? ["type", "dict", "artikel"] : ["type", "dict"]).concat(emo ? ["pictype"] : []);
  const mode = modes[Math.floor(Math.random() * modes.length)];
  if (mode === "picmc") {
    const ds = picDistractors(w, 2);
    return { t: "mc", q: `<div class="pic-q">${emo}</div>Bu nedir?`, o: [w.de, ds[0].de, ds[1].de], c: 0, e: `${w.de} = ${w.tr}`, _srs: w.de };
  }
  if (mode === "pictype") {
    return { t: "gap", q: `<div class="pic-q">${emo}</div>Bunu Almanca yaz: ___` + (art ? " (artikelle birlikte)" : ""), a: [w.de], e: `${w.de} = ${w.tr}`, _srs: w.de };
  }
  if (mode === "mc") {
    const ds = packDistractors(w, 2);
    return { t: "mc", q: `"${w.de}" ne demek?`, o: [w.tr, ds[0].tr, ds[1].tr], c: 0, e: "", _srs: w.de };
  }
  if (mode === "artikel") {
    const wrong = ["der", "die", "das"].filter(a => a !== art[1]);
    return { t: "mc", q: `___ ${art[2]}`, o: [art[1], wrong[0], wrong[1]], c: 0, e: `${w.de} = ${w.tr}. Artikeli kelimeyle birlikte ezberle.`, _srs: w.de };
  }
  if (mode === "dict") {
    return { t: "dict", say: w.de, q: "Duyduğun kelimeyi aynen yaz" + (art ? " (artikelle birlikte)" : ""), a: [w.de], e: `${w.de} = ${w.tr}`, _srs: w.de };
  }
  return { t: "gap", q: "Almancasını yaz: ___" + (art ? " (artikelle birlikte)" : ""), tr: w.tr, a: [w.de], e: "", _srs: w.de };
}
function srsTag(q) { q._diag = "wort"; return q; }
function srsApply(q, ok) {
  if (!q._srs) return;
  const st = S.srs[q._srs] || { lvl: 0, due: todayStr() };
  if (ok) { st.lvl = Math.min(5, st.lvl + 1); st.due = plusDays(SRS_IV[st.lvl]); }
  else {
    st.lvl = 0; st.due = todayStr();
    if (QZ.cfg.qs.length < 24) QZ.cfg.qs.push(makeSrsQ(WORDS.get(q._srs)));
  }
  S.srs[q._srs] = st;
  save();
}

let SAVE_MODE = "none";
async function saveNow() {
  const j = JSON.stringify(S);
  let cloud = false;
  try { if (window.storage) { await window.storage.set(SAVE_KEY, j); cloud = true; } } catch (e) {}
  let local = false;

  SAVE_MODE = cloud ? "cloud" : local ? "local" : "none";
  const el = document.getElementById("saveMode");
  if (el) el.innerHTML = saveModeText();
}
function saveModeText() {
  if (SAVE_MODE === "cloud") return "☁️ Artifact deposu aktif, ilerleme otomatik kaydediliyor.";
  if (SAVE_MODE === "local") return "💾 Tarayıcı deposu aktif, ilerleme bu tarayıcıda otomatik kaydediliyor.";
  return "⚠️ Bu ortamda kalıcı depo yok. Çıkmadan önce aşağıdan kayıt kodunu kopyala, yoksa ilerleme silinir.";
}
function save() {
  if (SAVE_T) clearTimeout(SAVE_T);
  SAVE_T = setTimeout(() => { SAVE_T = null; saveNow(); }, 600);
}
window.addEventListener("visibilitychange", () => { if (document.hidden) saveNow(); });

function migrateState(p) {
  const st = Object.assign(freshState(), p);
  DATA.forEach(d => { st.dist[d.id] = Object.assign({ v: 0, g: 0, q: 0, b: 0, k: 0, r: 0 }, st.dist[d.id] || {}); });
  st.extra = Object.assign({ katze: 0, weg: 0 }, st.extra || {});
  return st;
}
async function loadSave() {
  let cloudP = null, localP = null;
  try {
    if (window.storage) {
      const r = await window.storage.get(SAVE_KEY);
      if (r && r.value) { cloudP = JSON.parse(r.value); SAVE_MODE = "cloud"; }
    }
  } catch (e) {}
  try {
    const r = localStorage.getItem(SAVE_KEY);
    if (r) { localP = JSON.parse(r); if (SAVE_MODE !== "cloud") SAVE_MODE = "local"; }
  } catch (e) {}
  const p = (cloudP && localP) ? ((localP.xp || 0) > (cloudP.xp || 0) ? localP : cloudP) : (cloudP || localP);
  return p ? migrateState(p) : null;
}

function importCode(str) {
  try {
    const raw = String(str).trim();

function levelInfo() {
  let lvl = 1, need = 100, rest = S.xp;
  while (rest >= need && lvl < 10) { rest -= need; lvl++; need = 100 + (lvl - 1) * 60; }
  return { lvl, rest, need, title: TITLES[Math.min(lvl - 1, TITLES.length - 1)] };
}

function addXP(xp, coins) {
  const before = levelInfo().lvl;
  if (S.boostUntil && Date.now() < S.boostUntil) xp *= 2;
  S.xp += xp; S.coins += coins;
  const dx = todayStr();
  S.log[dx] = S.log[dx] || { xp: 0, r: 0, w: 0 };
  S.log[dx].xp += xp;
  const after = levelInfo().lvl;
  renderHUD();
  if (after > before) { blip("win"); toast(`⭐ Level ${after}: ${TITLES[after - 1]}`); }
  save();
}

function touchStreak() {
  const t = todayStr();
  if (S.streak.last === t) return;
  const y = new Date(); y.setDate(y.getDate() - 1);
  const y2 = new Date(); y2.setDate(y2.getDate() - 2);
  if (S.streak.last === y.toISOString().slice(0, 10)) S.streak.n = S.streak.n + 1;
  else if (S.streak.last === y2.toISOString().slice(0, 10) && S.freeze > 0) {
    S.freeze--; S.streak.n = S.streak.n + 1;
    toast("🧊 Streik-Schutz kullanıldı, serin kurtuldu");
  } else S.streak.n = 1;
  S.streak.last = t;
  if (S.streak.n >= 3) unlockAch("streak3");
  if (S.streak.n >= 7) unlockAch("streak7");
  renderHUD();
}

function unlockAch(id) {
  if (S.ach.includes(id)) return;
  const a = ACH.find(a => a.id === id); if (!a) return;
  S.ach.push(id);
  setTimeout(() => { toast(`${a.emoji} Başarı: ${a.name}`); blip("win"); }, 600);

function renderMatchRound() {

function pickMatch(btn) {
  const side = btn.dataset.side;
  document.querySelectorAll(`.m-btn[data-side="${side}"]`).forEach(b => b.classList.remove("sel"));
  btn.classList.add("sel");
  if (side === "de") { M.selDe = btn; speak(btn.dataset.k); } else M.selTr = btn;
  if (M.selDe && M.selTr) {
    if (M.selDe.dataset.k === M.selTr.dataset.k) {
      blip("ok");
      M.selDe.classList.remove("sel"); M.selTr.classList.remove("sel");
      M.selDe.classList.add("hit"); M.selTr.classList.add("hit");
      M.left--;
      if (M.left === 0) setTimeout(nextMatchRound, 450);
    } else {
      blip("bad"); M.mistakes++;
      const a = M.selDe, b = M.selTr;
      a.classList.add("miss"); b.classList.add("miss");
      setTimeout(() => { a.classList.remove("miss", "sel"); b.classList.remove("miss", "sel"); }, 400);
    }
    M.selDe = null; M.selTr = null;
  }
}
function nextMatchRound() {

let QZ = null;
let QUIZ_SEQ = 0;
function runQuiz(cfg) {

function segsHTML() {

let TIMER = null;
function clearTimer() { if (TIMER) { clearInterval(TIMER); TIMER = null; } }
function startTimer(sec) {

    const left = end - Date.now();

function normDe(s) {

    .replace(/ä/g, "ae").replace(/ö/g, "oe").replace(/ü/g, "ue").replace(/ß/g, "ss")

function renderQ() {

      inner = `<div class="q-text">🎧 ${q.q}</div>
        <button class="play-big" data-say="${String(q.say).replace(/"/g, "&quot;")}" onclick="speak(this.dataset.say)">🔊 Dinle (tekrar dinleyebilirsin)</button>

    } else {

    }
  } else if (q.t === "rf") {
    QZ.opts = [{ t: "Richtig", c: q.c === 0 }, { t: "Falsch", c: q.c === 1 }];
    inner = `<div class="q-tr">Metne göre bu ifade doğru mu yanlış mı?</div>
      <div class="q-text">"${q.s}"</div>
      <div id="optBox">${QZ.opts.map(o =>
        `<button class="btn opt" data-c="${o.c ? 1 : 0}" onclick="answerMC(this)">${o.t}</button>`).join("")}</div>`;

         ${window.speechSynthesis ? "" : `<div class="q-tr">Cihazında ses desteği yok. Aranan: "${q.show || q.say}"</div>`}`
      : q.t === "write"

      ${kbHTML("gapInput")}
      <div class="btn-row"><button class="btn" id="checkBtn" onclick="checkGap()">Kontrol et</button></div>`;
  } else {

    ${QZ.cfg.headerHTML || ""}
    ${QZ.cfg.battle ? `<div id="arena"></div>` : ""}
    ${segsHTML()}
    <div class="card" id="qbox">
      ${QZ.cfg.timeLimit ? `<div class="timer"><div class="timer-fill" id="timerFill"></div></div>` : ""}
      ${inner}<div id="fbBox"></div></div>`;
  if (q.t === "build") drawBuild();
  if (q.t === "listen" || q.t === "dict") setTimeout(() => speak(q.say), 350);
  if (QZ.cfg.battle) updateArena();
  if (QZ.cfg.timeLimit) startTimer(QZ.cfg.timeLimit + ((q.t === "write" || q.t === "dict") ? 15 : 0));
  else if (QZ.cfg.deadline) startSecTimer();

function startSecTimer() {
  const runId = QZ.runId;
  const tick = () => {
    if (!QZ || QZ.runId !== runId) { clearTimer(); return; }
    const left = QZ.cfg.deadline - Date.now();
    const el = document.getElementById("secT");
    if (el) el.textContent = "⏱ " + fmtMS(left);
    if (left <= 0) {
      clearTimer();
      document.querySelectorAll("#optBox .btn, .chip").forEach(b => b.disabled = true);
      const gi = document.getElementById("gapInput"); if (gi) gi.disabled = true;
      const cb = document.getElementById("checkBtn"); if (cb) cb.disabled = true;
      QZ.answered = true;
      toast("⏱ Bölüm süresi doldu");
      const cfg = QZ.cfg;
      setTimeout(() => cfg.onDone(QZ.correct, cfg.qs.length, true), 600);
    }
  };
  tick();
  TIMER = setInterval(tick, 500);
}
function checkGap() {
  if (QZ.answered) return;
  const v = $("#gapInput").value;
  if (!v.trim()) { toast("Önce cevabını yaz"); return; }
  QZ.answered = true;
  $("#gapInput").disabled = true; $("#checkBtn").disabled = true;

  const r = analyzeAnswer(v, q.a);
  QZ.note = r.note || "";
  QZ.noteKind = r.kind || "";
  QZ.lastInput = v;
  finishAnswer(r.ok);
}
function diffWords(user, target) {
  const clean = s => String(s).replace(/[.,!?;:„“”"'’]/g, "").replace(/\s+/g, " ").trim();
  const ut = clean(user).split(" "), tt = clean(target).split(" ");
  const row = (toks, other) => toks.map((w, i) => `<span class="tok ${other[i] === w ? "ok" : "bad"}">${esc(w)}</span>`).join(" ");
  return `<div class="dw">
    <span class="lab">SENİN CÜMLEN</span><div>${row(ut, tt)}</div>
    <span class="lab" style="margin-top:6px">DOĞRUSU</span><div>${row(tt, ut)}</div>
  </div>`;
}
function drawBuild() {
  $("#chipBox").innerHTML = QZ.pool.filter(c => !c.used).map(c =>
    `<button class="chip" onclick="chipTap(${c.id})">${c.w}</button>`).join("") || "&nbsp;";
  $("#ansLine").innerHTML = QZ.ans.map(c =>
    `<button class="chip" onclick="ansTap(${c.id})">${c.w}</button>`).join("");
}
function chipTap(id) {
  if (QZ.answered) return;
  const c = QZ.pool.find(c => c.id === id && !c.used);
  if (!c) return;
  c.used = true; QZ.ans.push(c); blip(); drawBuild();
}
function ansTap(id) {
  if (QZ.answered) return;
  const k = QZ.ans.findIndex(c => c.id === id);
  if (k < 0) return;
  QZ.ans[k].used = false; QZ.ans.splice(k, 1); drawBuild();
}
function clearBuild() {
  if (QZ.answered) return;
  QZ.ans.forEach(c => c.used = false); QZ.ans = []; drawBuild();
}
function answerMC(btn) {
  if (QZ.answered) return;
  QZ.answered = true;
  const ok = btn.dataset.c === "1";
  document.querySelectorAll("#optBox .btn").forEach(b => {
    b.disabled = true;
    if (b.dataset.c === "1") b.classList.add("right");
  });
  if (!ok) btn.classList.add("wrong");
  finishAnswer(ok);
}
function checkBuild() {
  if (QZ.answered) return;
  const q = QZ.cfg.qs[QZ.idx];
  if (QZ.ans.length < q.w.length) { toast("Önce tüm kelimeleri yerleştir"); return; }
  QZ.answered = true;
  $("#checkBtn").disabled = true;
  const ok = QZ.ans.map(c => c.w).join(" ") === q.w.join(" ");
  finishAnswer(ok);
}
function finishAnswer(ok, timedOut) {
  clearTimer();
  const q = QZ.cfg.qs[QZ.idx];
  QZ.segs.push(ok);
  if (ok) { QZ.correct++; blip("ok"); } else blip("bad");
  if (q._key) {
    if (!ok) {
      if (!S.mist.includes(q._key)) { S.mist.push(q._key); if (S.mist.length > 40) S.mist.shift(); }
      S.mistWin[q._key] = 0;
    } else if (S.mist.includes(q._key)) {
      S.mistWin[q._key] = (S.mistWin[q._key] || 0) + 1;
      if (S.mistWin[q._key] >= 3) {
        S.mist = S.mist.filter(k => k !== q._key);
        delete S.mistWin[q._key];
        toast("🖼️ Bir eser müzeden kaldırıldı");
      }
    }
  }
  const dlog = todayStr();
  S.log[dlog] = S.log[dlog] || { xp: 0, r: 0, w: 0 };
  ok ? S.log[dlog].r++ : S.log[dlog].w++;
  diagBump(q._diag, ok);
  if (q.t === "dict" || q.t === "listen") diagBump("horen", ok);
  if (q.t === "write") diagBump("schreib", ok);
  if (!ok && QZ.noteKind) diagBump(QZ.noteKind, false);
  save();
  let sentence, full;
  if (q.t === "build") { sentence = q.w.join(" "); full = sentence; }
  else if (q.t === "gap") { sentence = q.a[0]; full = (!q._srs && q.q.includes("___")) ? q.q.replace("___", q.a[0]).replace(/\s*\([^)]*\)\s*$/, "") : q.a[0]; }
  else if (q.t === "dict") { sentence = q.a[0]; full = q.say; }
  else if (q.t === "listen") { sentence = q.o[q.c]; full = q.say; }
  else if (q.t === "rf") { sentence = q.c === 0 ? "Richtig" : "Falsch"; full = q.s; }
  else if (q.t === "write") { sentence = q.a[0]; full = q.a[0]; }
  else { sentence = q.o[q.c]; full = q.q.includes("___") ? q.q.replace("___", q.o[q.c]).replace(/\s*\([^)]*\)\s*$/, "") : q.o[q.c]; }
  const note = QZ.note || ""; QZ.note = "";
  $("#fbBox").innerHTML = `
    <div class="explain ${ok ? "good" : "badx"}">
      <b>${ok ? "Richtig ✓" : timedOut ? "Zeit um ⏱" : "Falsch ✗"}</b> · Doğru cevap: <b>${sentence}</b> ${spkBtn(full)}
      ${note ? `<div class="mt" style="margin-top:6px">${note}</div>` : ""}
      ${q.t === "listen" && !ok ? `<div class="mt" style="margin-top:6px">Cümle: "${q.show || q.say}"</div>` : ""}
      ${(q.t === "write" || q.t === "dict") && !ok && QZ.lastInput ? diffWords(QZ.lastInput, q.a[0]) : ""}
      ${q.e ? `<div class="mt" style="margin-top:6px">${q.e}</div>` : ""}
    </div>
    ${ok ? "" : `<button class="btn mt" onclick="nextQ()">Devam →</button>`}`;
  const prog = document.querySelector(".q-progress");
  if (prog) prog.outerHTML = segsHTML();
  if (QZ.cfg.onAnswer) QZ.cfg.onAnswer(q, ok);
  if (QZ.cfg.battle) battleHit(ok);
  if (ok) {
    const rid = QZ.runId, qi = QZ.idx;
    setTimeout(() => { if (QZ && QZ.runId === rid && QZ.idx === qi && document.getElementById("fbBox")) nextQ(); }, 950);
  }
}
function nextQ() {
  if (QZ.cfg.battle && B && B.over) return;
  QZ.idx++;
  if (QZ.cfg.battle) {
    if (QZ.idx >= QZ.cfg.qs.length) {
      const d = DATA[B.i];
      QZ.cfg.qs = QZ.cfg.qs.concat(shuffle(d.practice.concat(d.boss.qs)));
    }
    renderQ(); return;
  }
  if (QZ.idx < QZ.cfg.qs.length) renderQ();
  else QZ.cfg.onDone(QZ.correct, QZ.cfg.qs.length);
}

async function aiCorrect(userText, taskDesc) {
  const prompt = `Sen deneyimli bir Almanca öğretmenisin. A2 seviyesindeki bir Türk öğrencinin yazdığı metni düzelteceksin.
SADECE geçerli bir JSON nesnesi döndür, başka hiçbir şey yazma, Markdown kullanma. Format:
{"score": 0-10 arasi tam sayi, "corrected": "metnin düzeltilmiş Almanca hali", "errors": [{"orig": "hatalı kısım", "fix": "doğrusu", "why": "kısa Türkçe açıklama"}], "tip": "öğrenciye kısa Türkçe tavsiye"}
Kurallar: A2 seviyesine göre değerlendir. Büyük küçük harf ve umlaut hatalarını mutlaka yakala. Görev şartlarını (içerik noktaları, hitap, kapanış) kontrol et. Açıklamalarda em dash, noktalı virgül ve ünlem işareti kullanma. En fazla 6 hata listele.
GÖREV: ${taskDesc}
ÖĞRENCİNİN METNİ:
"""${userText}"""`;
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content: prompt }] })
  });
  const data = await res.json();
  const text = (data.content || []).filter(i => i.type === "text").map(i => i.text).join("\n");
  const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
  if (typeof parsed.score !== "number" || !parsed.corrected) throw new Error("bad ai response");
  return parsed;
}

function genDrill(topic, n) {
  const qs = [];
  const seen = new Set();
  let guard = 0;
  while (qs.length < n && guard++ < n * 12) {
    const q = DRILLS[topic].gen();
    q._diag = topic;
    const key = q.q || (q.w && q.w.join(" "));
    if (seen.has(key)) continue;
    seen.add(key); qs.push(q);
  }
  return qs;
}
function startDrill(topic, backFn, backLabel) {
  runQuiz({
    qs: genDrill(topic, 10), title: "⚡ Antrenman: " + DRILLS[topic].name,
    backLabel: backLabel || "GERİ", backFn,
    onDone: (correct, total) => {
      touchStreak(); addXP(15, 5); save();
      $("#view").innerHTML = `
        <div class="card reward-box"><div class="reward-emoji">⚡</div>
        <h2>${correct}/${total}</h2>
        <p class="sub">${correct === total ? "Kusursuz seri. Sorular her seferinde yeniden üretiliyor, yarın yine farklı gelecek." : "Sorular her turda yeniden üretilir, hemen bir tur daha atabilirsin."}</p>
        <div class="reward-nums">+15 XP · +5 💶</div>
        <div class="btn-row">
          <button class="btn" onclick="startDrill('${topic}', ${JSON.stringify(backFn).replace(/"/g, "&quot;")}, '${backLabel || "GERİ"}')">⚡ Bir tur daha</button>
          <button class="btn ghost" onclick="${backFn}">Bitir</button>
        </div></div>`;
    }
  });
}

function useItem(id) {
  if (B.over || !S.inv[id]) return;
  const q = QZ.cfg.qs[QZ.idx];
  if (id === "mate") {
    if (QZ.answered) { toast("İpucu sıradaki soruda işe yarar"); return; }
    S.inv.mate--;
    if (q.t === "mc" || q.t === "listen") {
      const wrongs = Array.from(document.querySelectorAll('#optBox .btn[data-c="0"]'));
      shuffle(wrongs).slice(0, Math.max(0, wrongs.length - 1)).forEach(b => b.style.visibility = "hidden");
      toast("🧉 Club-Mate: yanlış şıklar elendi");
    } else if (q.t === "gap" || q.t === "dict" || q.t === "write") {
      const a = q.a[0];
      const gi = document.getElementById("gapInput");
      if (gi && !gi.disabled) { gi.value = a.slice(0, Math.ceil(a.length / 2)); gi.focus(); }
      toast("🧉 Club-Mate: cevabın yarısı yazıldı");
    } else if (q.t === "build" && QZ.pool) {
      const next = q.w[QZ.ans.length];
      const c = QZ.pool.find(c => !c.used && c.w === next);
      if (c) { c.used = true; QZ.ans.push(c); drawBuild(); }
      toast("🧉 Club-Mate: sıradaki kelime yerleşti");
    } else { S.inv.mate++; toast("Bu soruda ipucu kullanılamıyor"); }
  } else {
    const heal = SHOP.find(s => s.id === id).heal;
    S.inv[id]--; B.me = Math.min(100, B.me + heal);
    blip("ok"); toast(`+${heal} can`);

}
function battleHit(ok) {
  if (ok) {
    B.combo++; B.maxCombo = Math.max(B.maxCombo, B.combo);
    if (B.maxCombo >= 5) unlockAch("combo5");
    const dmg = Math.min(21, 15 + (B.combo - 1) * 2);
    B.boss -= dmg;
    if (!B.rage && B.boss > 0 && B.boss <= B.maxB * 0.4) {
      B.rage = true;
      toast(`💢 ${DATA[B.i].boss.name} öfkelendi. Hataların artık daha çok acıtıyor.`);
    }
    updateArena();
    const emo = $("#bossEmo");
    if (emo) {
      emo.classList.add("hit");
      const f = el("span", "dmg-float", "-" + dmg);
      emo.parentElement.style.position = "relative";
      f.style.left = "58%"; f.style.top = "10px";
      emo.parentElement.appendChild(f);
      setTimeout(() => f.remove(), 800);
    }
    if (B.boss <= 0) return battleWin();
  } else {
    const broke = B.combo >= 3;
    B.combo = 0; B.hurt = true;
    const q = QZ.cfg.qs[QZ.idx];
    const stamped = DATA[B.i].boss.mech === "form" && (q.t === "gap" || q.t === "dict" || q.t === "write");
    B.me -= (stamped ? 30 : 22) + (B.rage ? 6 : 0) + (broke ? 5 : 0);

    else if (broke) toast("Kombon kırıldı, ekstra 5 hasar");
    updateArena();
    if (B.me <= 0) return battleLose();
  }
}

/* =============== TANDEM: EMMA ILE SOHBET =============== */
async function tandemAI() {
  const sys = `Sen Emma'sın: 26 yaşinda, Hamburg'da yaşayan neşeli bir Alman. ${S.name} ile mektup arkadaşısın ve şimdi yazılı sohbet ediyorsunuz. KURALLAR: Sadece basit A2 Almancası kullan, kısa cümleler kur. Her mesajında 1 ile 3 cümle yaz ve sohbeti sürdürmek için bir soru sor. Partnerin son mesajında dil hatası varsa en önemli TEK hatayı nazikçe düzelt. SADECE şu JSON formatında cevap ver, önünde veya arkasında hiçbir şey olmadan: {"reply":"Almanca cevabın","fix":null} veya {"reply":"...","fix":{"orig":"hatalı kısım","fix":"doğrusu","why":"çok kısa Türkçe açıklama"}}`;
  const msgs = [{ role: "user", content: sys }, { role: "assistant", content: '{"reply":"Hallo, schön dass du da bist. Wie geht es dir heute?","fix":null}' }];
  S.tandem.msgs.forEach(m => msgs.push({ role: m.u ? "user" : "assistant", content: m.u ? m.de : JSON.stringify({ reply: m.de, fix: m.fix || null }) }));
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: msgs })
  });
  const data = await response.json();
  const text = data.content.map(i => i.type === "text" ? i.text : "").join("").replace(/```json|```/g, "").trim();
  return JSON.parse(text);
}
function startTandem() {
  if (!S.tandem.msgs.length) S.tandem.msgs.push({ u: 0, de: "Hallo, hier ist Emma. Endlich können wir richtig schreiben. Wie war dein Tag?" });
  $("#view").innerHTML = `
    <button class="back" onclick="goTab('daily')">← MERKEZ</button>
    <div class="eyebrow">Tandem · Hamburg ↔ Berlin</div>
    <h1>💬 Emma</h1>
    <p class="sub">Serbest Almanca sohbet. Emma A2 seviyesinde cevap verir, hata yaparsan mesajın altında tek ve nazik bir düzeltme görürsün. Çekinme, hata bu odanın ders materyali.</p>
    <div class="chatbox" id="chatBox"></div>
    <div class="btn-row" id="topicRow">
      ${["das Wochenende", "Musik", "Essen", "die Arbeit", "Berlin"].map(t => `<button class="btn small ghost" onclick="$('#chatIn').value='Erzähl mir von ' + this.textContent + '.'">${t}</button>`).join("")}
    </div>
    <textarea class="warea" id="chatIn" style="min-height:70px" placeholder="Schreib auf Deutsch..."></textarea>
    ${kbHTML("chatIn")}
    <button class="btn mt" id="chatSend" onclick="tandemSend()">📨 Senden</button>`;
  tandemDraw();
  uiBottom();
}
function tandemDraw() {
  $("#chatBox").innerHTML = S.tandem.msgs.map(m => `
    <div class="bub ${m.u ? "me" : "emma"}">
      ${m.u ? "" : "<b>Emma</b> " + spkBtn(m.de) + "<br>"}${esc(m.de)}
      ${m.fix ? `<div class="fixrow">✏️ <b>${esc(m.fix.orig)}</b> → <b>${esc(m.fix.fix)}</b><br>${esc(m.fix.why)}</div>` : ""}
    </div>`).join("");
}
async function tandemSend() {
  const v = $("#chatIn").value.trim();
  if (v.length < 2) { toast("Bir şeyler yaz"); return; }
  S.tandem.msgs.push({ u: 1, de: v });
  if (S.tandem.msgs.length > 40) S.tandem.msgs = S.tandem.msgs.slice(-40);
  $("#chatIn").value = "";
  tandemDraw();
  $("#chatBox").insertAdjacentHTML("beforeend", `<div class="bub emma" id="typing">Emma yazıyor...</div>`);
  $("#chatSend").disabled = true;
  try {
    const r = await tandemAI();
    S.tandem.msgs.push({ u: 0, de: r.reply, fix: r.fix || null });
    if (r.fix) diagBump("schreib", false);
    touchStreak(); save();
  } catch (e) {
    S.tandem.msgs.pop();
    toast("Bağlantı kurulamadı, mesajın gönderilmedi. Tekrar dene.");
    $("#chatIn").value = v;
  }
  $("#chatSend").disabled = false;
  const t = $("#typing"); if (t) t.remove();
  tandemDraw();
  uiBottom();
}

function storyStart(i) { ST = { i, node: "n1", good: 0 }; storyNode(); }
function storyNode() {
  const s = STORIES[ST.i];
  const n = s.nodes[ST.node];
  if (n.end) return storyEnd(n);
  $("#view").innerHTML = `
    <button class="back" onclick="startStories()">← HİKAYELER</button>

      <div class="sub" style="margin-top:4px">${n.tr}</div>
    </div>
    <div id="stChoices">${n.ch.map((c, k) => `<button class="btn opt" onclick="storyPick(${k})">${c.de}</button>`).join("")}</div>
    <div id="stNote"></div>`;
  uiTop();
}
function storyPick(k) {
  const s = STORIES[ST.i];
  const c = s.nodes[ST.node].ch[k];
  if (c.good) ST.good++;
  if (c.note) {
    document.querySelectorAll("#stChoices .btn").forEach(b => b.disabled = true);
    $("#stNote").innerHTML = `<div class="explain ${c.good ? "good" : "badx"}">${c.note}</div>`;
    setTimeout(() => { ST.node = c.to; storyNode(); }, 1600);
  } else { ST.node = c.to; storyNode(); }
}
function storyEnd(n) {
  const s = STORIES[ST.i];
  const first = !S.story[s.id];
  const prev = S.story[s.id] || {};
  S.story[s.id] = { done: 1, best: prev.best || n.best || 0 };
  const xp = first ? 25 : 8;

/* =============== LERNKURVE =============== */
function kurveDays(n) {
  const out = [];
  for (let i = n - 1; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    out.push(d.toISOString().slice(0, 10));
  }
  return out;
}
function kurveBarSVG(vals, color) {
  const max = Math.max(...vals, 1);
  const w = 300, h = 80, bw = w / vals.length;
  return `<svg viewBox="0 0 ${w} ${h}" width="100%">${vals.map((v, i) =>
    `<rect x="${i * bw + 2}" y="${h - (v / max) * (h - 10)}" width="${bw - 4}" height="${Math.max(1, (v / max) * (h - 10))}" rx="2" fill="${color}" opacity="${v ? 1 : 0.25}"/>`).join("")}</svg>`;
}
function kurveLineSVG(vals) {
  const w = 300, h = 80;
  const pts = vals.map((v, i) => v == null ? null : `${(i / (vals.length - 1)) * (w - 10) + 5},${h - 8 - (v / 100) * (h - 16)}`);
  const seg = pts.filter(Boolean).join(" ");
  return `<svg viewBox="0 0 ${w} ${h}" width="100%">
    <line x1="5" y1="${h - 8 - 0.6 * (h - 16)}" x2="${w - 5}" y2="${h - 8 - 0.6 * (h - 16)}" stroke="var(--edge)" stroke-dasharray="4 4"/>
    ${seg ? `<polyline points="${seg}" fill="none" stroke="var(--gelb)" stroke-width="2.5"/>` : ""}
    ${pts.map(p => p ? `<circle cx="${p.split(",")[0]}" cy="${p.split(",")[1]}" r="3" fill="var(--gelb)"/>` : "").join("")}
  </svg>`;
}

  const days = kurveDays(14);

function startLandeskunde() {
  $("#view").innerHTML = `
    <button class="back" onclick="goTab('daily')">← MERKEZ</button>

    ${LK.map((cap, i) => {
      const best = (S.lk || {})[cap.id];
      return `<div class="card" style="cursor:pointer" onclick="lkOpen(${i})">
        <div class="pack-top"><span class="pack-emoji">${cap.emoji}</span>
          <span class="pack-name">${cap.name}</span>
          <span class="pack-n">${best != null ? "en iyi: " + best + "/" + cap.qs.length + (best === cap.qs.length ? " 🏅" : "") : cap.facts.length + " bilgi"}</span></div>
      </div>`;
    }).join("")}`;
  uiTop();
}
function lkOpen(i) {
  const cap = LK[i];
  $("#view").innerHTML = `
    <button class="back" onclick="startLandeskunde()">← KAPSÜLLER</button>
    <div class="eyebrow">Landeskunde · ${cap.name}</div>
    <h1>${cap.emoji} ${cap.name}</h1>
    ${cap.facts.map(f => `
      <div class="card">
        <div><b>${f.de}</b> ${spkBtn(f.de)}</div>
        <div class="sub" style="margin-top:4px">${f.tr}</div>
        ${f.plus ? `<div class="sub" style="color:var(--gelb);font-size:12.5px;margin-top:4px">💡 ${f.plus}</div>` : ""}
      </div>`).join("")}
    <button class="btn mt" onclick="lkQuiz(${i})">🧠 Teste dich (${cap.qs.length} soru)</button>`;
  uiTop();
}
function lkQuiz(i) {
  const cap = LK[i];
  runQuiz({
    qs: shuffle(cap.qs.slice()), title: `🧠 ${cap.name}`,
    backLabel: cap.name.toUpperCase(), backFn: `lkOpen(${i})`,
    onDone: (correct, total) => {
      S.lk = S.lk || {};
      const prev = S.lk[cap.id];
      const first = prev == null;
      S.lk[cap.id] = Math.max(prev || 0, correct);
      const allDone = LK.every(c => (S.lk[c.id] || 0) >= c.qs.length);
      touchStreak(); addXP(first ? 30 : 10, first ? 10 : 4); save();
      $("#view").innerHTML = `
        <div class="card reward-box"><div class="reward-emoji">${correct === total ? "🏅" : cap.emoji}</div>
        <h2>${correct}/${total}</h2>
        <p class="sub">${correct === total ? "Kapsül tamam, bu konuda bir Alman kadar hazırsın." : "Bilgi kartlarına dönüp eksikleri kapatabilirsin, en iyi skorun saklanır."}${allDone ? " Sekiz kapsülün sekizi de tam, resmen Landeskunde-Profi oldun." : ""}</p>
        <div class="reward-nums">+${first ? 30 : 10} XP · +${first ? 10 : 4} 💶</div>
        <div class="btn-row">
          <button class="btn ghost" onclick="lkQuiz(${i})">🔁 Tekrar</button>
          <button class="btn" onclick="startLandeskunde()">Kapsüller</button>
        </div></div>`;
    }
  });
}

/* =============== RUSH HOUR (90 saniye sprint) =============== */
let RH = null, RTIMER = null;
function startRush() {
  const auth = [];
  DATA.forEach(d => [...d.practice, ...d.boss.qs].forEach(q => { if (q.t === "mc") auth.push(q); }));
  RH = { score: 0, streak: 0, end: Date.now() + 90000, auth, topics: Object.keys(DRILLS), over: false };
  clearInterval(RTIMER);
  RTIMER = setInterval(() => {
    const bar = document.getElementById("rushBar");
    if (!bar || !RH) { clearInterval(RTIMER); return; }
    const left = RH.end - Date.now();
    bar.style.width = Math.max(0, left / 900) + "%";
    const tt = document.getElementById("rushT");
    if (tt) tt.textContent = fmtMS(left);
    if (left <= 0 && !RH.over) rushEnd();
  }, 120);
  rushNext();
}
function rushQ() {
  for (let i = 0; i < 6; i++) {
    const q = DRILLS[pick(RH.topics)].gen();
    if (q.t === "mc") return q;
  }
  return pick(RH.auth);
}
function rushNext() {
  if (!RH || RH.over) return;
  if (Date.now() >= RH.end) return rushEnd();
  const q = rushQ();
  const opts = shuffle(q.o.map((t, k) => ({ t, c: k === q.c })));
  $("#view").innerHTML = `
    <div class="eyebrow">Rush Hour · U-Bahn doluyor</div>
    <div style="display:flex;justify-content:space-between;align-items:baseline">
      <h2 style="margin:0">🚇 ${RH.score} puan</h2>
      <span class="pack-n" id="rushT"></span>
    </div>
    <div class="timer" style="margin:8px 0"><div class="timer-fill" id="rushBar" style="width:100%"></div></div>
    <div class="sub">${RH.streak >= 5 ? "🔥 SICAK SERİ: doğrular 2 puan" : RH.streak > 1 ? "seri x" + RH.streak : "&nbsp;"}</div>
    <div class="card">
      <div class="q-text">${q.q}</div>
      <div id="optBox">${opts.map(o => `<button class="btn opt" data-c="${o.c ? 1 : 0}" onclick="rushAns(this)">${o.t}</button>`).join("")}</div>
    </div>
    <button class="back" onclick="rushQuit()">✕ Bırak</button>`;
}
function rushAns(btn) {
  if (!RH || RH.over) return;
  const ok = btn.dataset.c === "1";
  document.querySelectorAll("#optBox .btn").forEach(b => { b.disabled = true; if (b.dataset.c === "1") b.classList.add("right"); });
  if (ok) { RH.streak++; RH.score += RH.streak >= 5 ? 2 : 1; blip("ok"); }
  else { RH.streak = 0; btn.classList.add("wrong"); blip("bad"); }
  setTimeout(rushNext, ok ? 280 : 700);
}
function rushQuit() { if (RH) { RH.over = true; } clearInterval(RTIMER); RH = null; goTab("daily"); }
function rushEnd() {
  RH.over = true;
  clearInterval(RTIMER);
  const rec = RH.score > (S.rush.best || 0);
  if (rec) S.rush.best = RH.score;
  const xp = Math.min(70, 8 + RH.score * 2), co = Math.min(30, RH.score);
  touchStreak(); addXP(xp, co); save();
  $("#view").innerHTML = `
    <div class="card reward-box"><div class="reward-emoji">🚇</div>
    <h2>${RH.score} puan</h2>
    <p class="sub">${rec ? "Yeni rekor. Eski rekorunu geçtin." : "Rekorun: " + S.rush.best + ". Sıcak seriye girmek (5 doğru üst üste) puanı ikiye katlar."}</p>
    <div class="reward-nums">+${xp} XP · +${co} 💶</div>
    <div class="btn-row">
      <button class="btn" onclick="startRush()">🔁 Bir sefer daha</button>
      <button class="btn ghost" onclick="goTab('daily')">Merkeze dön</button>
    </div></div>`;
}

function buyShop(item) {
  if (item === "freeze") {
    if (S.freeze >= 2) { toast("En fazla 2 Streik-Schutz taşıyabilirsin"); return; }
    if (S.coins < 150) { toast("Yeterli paran yok, 150 💶 gerekiyor"); return; }
    S.coins -= 150; S.freeze++;
    toast("🧊 Streik-Schutz alındı");
  } else if (item === "boost") {
    if (S.boostUntil > Date.now()) { toast("Zaten aktif bir Tages-Ticket var"); return; }
    if (S.coins < 120) { toast("Yeterli paran yok, 120 💶 gerekiyor"); return; }
    S.coins -= 120; S.boostUntil = Date.now() + 24 * 3600000;
    toast("🚀 24 saat çift XP aktif");
  }
  save(); renderHUD();
  if ($("#view").innerHTML.includes("Späti am Gleis")) startShop(); else renderDaily();
}

function prfRunTeile(teile, deadline, onAllDone, moduleTitle) {
  let idx = 0, correct = 0;
  const grand = teile.reduce((n, t) => n + t.qs.length, 0);
  const next = () => {
    if (idx >= teile.length) { onAllDone(correct, grand); return; }
    const t = teile[idx++];
    runQuiz({
      qs: t.qs, title: moduleTitle + " · " + t.title,
      headerHTML: (t.header || "") + `<div class="sec-note" id="secT"></div>`,
      deadline,
      onDone: (c, tt, expired) => {
        correct += c;
        if (expired) { onAllDone(correct, grand, true); return; }
        next();
      }
    });
  };
  next();
}
function prfLesen() {
  const L = PRF_LESEN;
  const deadline = Date.now() + 20 * 60000;
  const teile = [
    { title: L.t1.title, qs: L.t1.qs, header: L.t1.text },
    { title: L.t2.title, qs: L.t2.qs, header: L.t2.ads },

  const l = pct(PRF.l), h = pct(PRF.h), s = pct(PRF.s);
  const pass = l >= 60 && h >= 60 && (s == null ? false : s >= 60);
  const bar = (name, p) => `

      <div class="diag-bar"><i style="width:${p == null ? 0 : p}%;background:${p == null ? "var(--muted)" : p >= 60 ? "var(--ok)" : "var(--bad)"}"></i></div>
      <span class="diag-pct">${p == null ? "yok" : "%" + p}</span></div>`;
  S.pruef = S.pruef || [];
  S.pruef.push({ d: todayStr(), l, h, s, pass });
  if (S.pruef.length > 10) S.pruef.shift();
  touchStreak(); addXP(pass ? 150 : 60, pass ? 60 : 25); save();
  $("#view").innerHTML = `

/* =============== DIAGNOSE ve WOCHENTEST =============== */
function diagBump(cat, ok) {
  if (!cat) return;
  const e = S.diag[cat] || { r: 0, w: 0 };
  if (ok) e.r++; else e.w++;
  S.diag[cat] = e;
}
const CAT_NAMES = {
  tuzak: "Türkçe Tuzakları", redemittel: "Kalıp ifadeler", kultur: "Almanya bilgisi", akk: "Akkusativ", modal: "Modalverben", dativ: "Dativ", trenn: "Trennbare Verben", pron: "Zamirler",
  komp: "Komparativ", perf: "Perfekt", neben: "Nebensätze", poss: "İyelik artikelleri", futur: "Futur ve bağlaçlar",
  ordinal: "Tarih ve ob", horen: "Dinleme", lesen: "Okuma", schreib: "Yazma", wort: "Kelime",
  gross: "Büyük küçük harf", umlaut: "Umlaut ve ß"
};
function diagRows() {
  return Object.keys(S.diag)
    .map(k => { const e = S.diag[k]; const n = e.r + e.w; return { k, n, pct: n ? Math.round(e.r / n * 100) : 0 }; })
    .filter(r => r.n >= 3 && CAT_NAMES[r.k])
    .sort((a, b) => a.pct - b.pct);
}
function diagTrainFn(k) {
  if (DRILLS[k]) return `startDrill('${k}', "goTab('daily')", 'BLITZ')`;
  if (k === "horen" || k === "gross" || k === "umlaut") return `startSkillSession('${k}')`;
  if (k === "wort") return `goTab('dict')`;
  if (k === "schreib") return `goTab('write')`;
  if (k === "lesen") { const idx = DATA.findIndex(d => d.kiosk); return `startKiosk(${idx + Math.floor(Math.random() * 8)})`; }
  return `goTab('map')`;
}
function startSkillSession(kind) {
  const pool = [];
  DATA.forEach(d => {
    if (d.radio) d.radio.dicts.forEach((x, k) => pool.push(dictQ(d, x, k)));
    d.practice.forEach(q => { if (q.t === "listen") pool.push(q); });
  });
  runQuiz({
    qs: shuffle(pool).slice(0, 8),
    title: kind === "horen" ? "🎧 Dinleme Antrenmanı" : "✍️ Yazım Antrenmanı (dikte)",
    backLabel: "BLITZ", backFn: "goTab('daily')",
    onDone: (correct, total) => {
      touchStreak(); addXP(15, 5); save();
      $("#view").innerHTML = `
        <div class="card reward-box"><div class="reward-emoji">🎧</div>
        <h2>${correct}/${total}</h2>
        <p class="sub">${kind === "horen" ? "Kulak antrenmanı tamam." : "Her dikte, büyük harf ve umlaut kasları için bir set."}</p>
        <div class="reward-nums">+15 XP · +5 💶</div>
        <div class="btn-row">
          <button class="btn" onclick="startSkillSession('${kind}')">🔁 Bir tur daha</button>
          <button class="btn ghost" onclick="goTab('daily')">Bitir</button>
        </div></div>`;
    }
  });
}
const GRADE_NAMES = { 1: "sehr gut", 2: "gut", 3: "befriedigend", 4: "ausreichend", 5: "mangelhaft", 6: "ungenügend" };
function gradeOf(pct) { return pct >= 0.92 ? 1 : pct >= 0.81 ? 2 : pct >= 0.67 ? 3 : pct >= 0.5 ? 4 : pct >= 0.3 ? 5 : 6; }
function startWochentest() {
  const authored = [];
  DATA.forEach(d => authored.push(...d.practice, ...d.boss.qs));
  const dicts = [];
  DATA.forEach(d => { if (d.radio) d.radio.dicts.forEach((x, k) => dicts.push(dictQ(d, x, k))); });
  const topics = Object.keys(DRILLS);
  const gen = [];
  for (let k = 0; k < 8; k++) { const q = DRILLS[pick(topics)].gen(); q._diag = q._diag || null; gen.push(q); }
  const qs = shuffle([...gen, ...shuffle(authored).slice(0, 10), ...shuffle(dicts).slice(0, 2)]);
  runQuiz({
    qs, title: "🗓️ Wochentest", timeLimit: 20,
    backLabel: "BLITZ", backFn: "goTab('daily')",
    onDone: (correct, total) => {
      const g = gradeOf(correct / total);
      S.wochen.push({ d: todayStr(), c: correct, t: total, g });
      if (S.wochen.length > 26) S.wochen.shift();
      const xp = { 1: 80, 2: 65, 3: 50, 4: 35, 5: 20, 6: 10 }[g];
      touchStreak(); addXP(xp, Math.round(xp / 2)); save();
      $("#view").innerHTML = `
        <div class="card reward-box">
          <div class="grade">${g}</div>
          <h2>Note ${g}: ${GRADE_NAMES[g]}</h2>
          <p class="sub">${total} sorudan ${correct} doğru. ${g <= 2 ? "Alman okul sisteminde bu karneye çerçeve yaptırılır." : g <= 4 ? "Geçer not. Diagnose paneli hangi konunun puan yediğini gösteriyor." : "Bu hafta zor geçmiş. Panele bak, zayıf konuya in, haftaya rövanş."}</p>
          <div class="reward-nums">+${xp} XP · +${Math.round(xp / 2)} 💶</div>
          <button class="btn mt" onclick="goTab('daily')">Devam</button>
        </div>`;
    }
  });
}

        <button class="btn small ghost" onclick="${diagTrainFn(r.k)}">🎯</button>
      </div>`).join("")}
      <p class="sub" style="margin-top:8px">Her satır o kategorideki doğruluk oranın. 🎯 seni doğrudan o alanın antrenmanına götürür. Kırmızılar önceliğin.</p>
    </div>` : `<div class="card tight"><p class="sub">Henüz yeterli veri yok. Soru çözdükçe hangi konuda güçlü, hangisinde zayıf olduğun burada kategori kategori belirecek.</p></div>`}`;
  uiTop();
}
function startDaily() {
  const pool = [];
  const topics = [];
  DATA.forEach((d, i) => {
    if (!isUnlocked(i)) return;
    pool.push(...d.practice, ...d.boss.qs);
    if (d.radio) d.radio.dicts.forEach((x, k) => pool.push(dictQ(d, x, k)));
    if (DRILL_MAP[d.id]) topics.push(DRILL_MAP[d.id]);
  });
  topics.push("tuzak", "tuzak", "redemittel");
  pool.push(...shuffle(LK.flatMap(c => c.qs)).slice(0, 2));
  for (let k = 0; k < 3 && topics.length; k++) pool.push(DRILLS[pick(topics)].gen());
  const mistQs = S.mist.map(qByKey).filter(Boolean).slice(0, 3);
  const rest = shuffle(pool.filter(q => !mistQs.includes(q))).slice(0, 10 - mistQs.length);
  runQuiz({
    qs: shuffle(mistQs.concat(rest)), title: "⚡ Blitzrunde", timeLimit: 20,
    backLabel: "GÜNLÜK", backFn: "renderDaily()",
    onDone: (correct, total) => {
      S.daily.date = todayStr(); touchStreak(); unlockAch("daily1");
      addXP(50, 25); save();
      $("#view").innerHTML = `
        <div class="card reward-box"><div class="reward-emoji">🔥</div>
        <h2>Blitz tamam.</h2>
        <p class="sub">${total} sorudan ${correct} doğru. Seri: ${S.streak.n} gün.${S.mist.length ? " Hata bankasında " + S.mist.length + " soru kaldı, yarın yine gelecekler." : " Hata bankası bomboş, temiz iş."}</p>
        <div class="reward-nums">+50 XP · +25 💶</div>
        <button class="btn mt" onclick="goTab('map')">Devam</button></div>`;
    }
  });
}

/* =============== VOKABELTRAINER =============== */
function renderTrainer() {
  const due = dueWords().length;
  const known = Object.keys(S.srs).length;
  const mastered = Object.values(S.srs).filter(s => s.lvl >= 4).length;
  $("#view").innerHTML = `
    <div class="eyebrow">Vokabeltrainer</div>
    <h1>🧠 Kelime</h1>
    <div class="tr-stats">
      <div class="tr-stat"><b>${due}</b><span>bugün tekrar</span></div>
      <div class="tr-stat"><b>${known}</b><span>öğrenilen</span></div>
      <div class="tr-stat"><b>${mastered}</b><span>oturmuş</span></div>
    </div>
    <button class="btn" onclick="startReview()" ${due ? "" : "disabled"}>🔁 Tekrar turu${due ? " (" + Math.min(due, 14) + " kelime)" : ""}</button>
    ${known === 0 ? `<div class="explain good mt">Kuyruk boş çünkü henüz kelime eklemedin. Aşağıdan bir paket seç veya haritada bir durağın kelimelerini bitir, kelimeler yarından itibaren tekrar turuna düşer.</div>` : ""}
    <p class="sub mt">Doğru bildikçe kelime 1, 3, 7, 14 ve 30 gün sonra tekrar gelir. Yanlışta sıfırlanır. Seviye yükseldikçe soru zorlaşır: önce anlam seçersin, sonra yazarsın, sonra duyup yazarsın.</p>
    <h2 class="mt">Yeni kelime paketleri</h2>
    ${PACKS.map(p => {
      const learned = p.words.filter(w => S.srs[w.de]).length;
      const pct = Math.round(learned / p.words.length * 100);
      return `<div class="pack" onclick="openPack('${p.id}')">
        <div class="pack-top"><span class="pack-emoji">${p.emoji}</span>
          <span class="pack-name">${p.name}</span>
          <span class="pack-n">${learned}/${p.words.length}</span></div>
        <div class="bar"><i style="width:${pct}%"></i></div>
      </div>`;
    }).join("")}
    <h2 class="mt">📖 Sözlük</h2>
    <input class="search" id="dictSearch" placeholder="Karşılaştığın kelimelerde ara" oninput="filterDict()">
    <div class="card tight" id="dictList" style="max-height:50vh;overflow-y:auto"></div>`;
  const rows = [];
  DATA.forEach((d, i) => { if (isUnlocked(i)) d.vocab.forEach(w => rows.push({ ...w, color: d.color })); });
  PACKS.forEach(p => p.words.forEach(w => { if (S.srs[w.de]) rows.push({ ...w, color: "var(--gelb)" }); }));
  window.dictRows = rows;
  filterDict();
  uiTop();
}
function filterDict() {
  const box = $("#dictList");
  if (!box) return;
  const q = ($("#dictSearch").value || "").toLowerCase();
  const rows = window.dictRows.filter(w => !q || w.de.toLowerCase().includes(q) || w.tr.toLowerCase().includes(q));
  box.innerHTML = rows.slice(0, 200).map(w => `
    <div class="dict-row">
      <span style="color:${w.color}">●</span>
      <b>${w.de}</b> ${spkBtn(w.de)}
      <span class="v-tr">${w.tr}</span>
    </div>`).join("") || `<p class="sub" style="padding:10px">Sonuç yok.</p>`;
}
function startReview() {
  const due = shuffle(dueWords()).slice(0, 14);
  if (!due.length) { toast("Bugün tekrar edilecek kelime yok"); return; }
  runQuiz({
    qs: due.map(makeSrsQ), title: "🔁 Tekrar Turu",
    backLabel: "KELİME", backFn: "renderTrainer()",
    onAnswer: srsApply,
    onDone: (correct, total) => {
      touchStreak(); addXP(20, 6);
      const left = dueWords().length;
      $("#view").innerHTML = `
        <div class="card reward-box"><div class="reward-emoji">🧠</div>
        <h2>Tekrar tamam.</h2>
        <p class="sub">${total} sorudan ${correct} doğru. ${left ? "Kuyrukta " + left + " kelime daha var." : "Bugünkü kuyruk temizlendi."}</p>
        <div class="reward-nums">+20 XP · +6 💶</div>
        <div class="btn-row">
          ${left ? `<button class="btn" onclick="startReview()">🔁 Devam et</button>` : ""}
          <button class="btn ghost" onclick="renderTrainer()">Bitir</button>
        </div></div>`;
    }
  });
}
function openPack(pid) {
  const p = PACKS.find(p => p.id === pid);
  const next = p.words.filter(w => !S.srs[w.de]).slice(0, 8);
  if (!next.length) {
    $("#view").innerHTML = `
      <button class="back" onclick="renderTrainer()">← KELİME</button>
      <h2>${p.emoji} ${p.name}</h2>
      <div class="card center"><div style="font-size:34px">✅</div>
      <b>Bu paketin tamamı öğrenme kuyruğunda.</b>
      <p class="sub">Kelimeler tekrar turlarında karşına çıkmaya devam edecek.</p></div>`;
    return;
  }
  window.packNext = next;
  $("#view").innerHTML = `
    <button class="back" onclick="renderTrainer()">← KELİME</button>
    <div class="eyebrow">${p.name}</div>
    <h2>${p.emoji} Yeni ${next.length} kelime</h2>
    <p class="sub">Önce göz at ve dinle, sonra mini quiz ile kuyruğa ekle.</p>
    <div class="v-grid">
      ${next.map(w => `<div class="v-card">
        <div class="v-de">${w.de} ${spkBtn(w.de)}</div>
        <div class="v-tr">${w.tr}</div></div>`).join("")}
    </div>
    <button class="btn mt" onclick="startPackQuiz('${pid}')">🎯 Mini quiz ve kuyruğa ekle</button>`;
  uiTop();
}
function startPackQuiz(pid) {
  const words = window.packNext || [];
  if (!words.length) { renderTrainer(); return; }
  runQuiz({
    qs: shuffle(words).map(w => {
      const ds = packDistractors(w, 2);
      return { t: "mc", q: `"${w.de}" ne demek?`, o: [w.tr, ds[0].tr, ds[1].tr], c: 0, e: "", _srs: w.de };
    }),
    title: "🎯 Yeni Kelimeler",
    backLabel: "KELİME", backFn: "renderTrainer()",
    onAnswer: (q, ok) => {
      if (!S.srs[q._srs]) S.srs[q._srs] = { lvl: 0, due: todayStr() };
      const st = S.srs[q._srs];
      if (ok) { st.lvl = 1; st.due = plusDays(1); }
      else { st.lvl = 0; st.due = todayStr(); }
      save();
    },
    onDone: (correct, total) => {
      touchStreak(); addXP(25, 8); checkWordAch();
      $("#view").innerHTML = `
        <div class="card reward-box"><div class="reward-emoji">➕</div>
        <h2>${total} kelime kuyrukta.</h2>
        <p class="sub">${correct} tanesini ilk seferde bildin. Hepsi yarın tekrar turunda karşına çıkacak.</p>
        <div class="reward-nums">+25 XP · +8 💶</div>
        <div class="btn-row">
          <button class="btn" onclick="openPack('${pid}')">➕ 8 kelime daha</button>
          <button class="btn ghost" onclick="renderTrainer()">Bitir</button>
        </div></div>`;
    }
  });
}

/* =============== SPÄTI (DÜKKAN) =============== */
function renderShop() {
  $("#view").innerHTML = `
    <div class="eyebrow">Späti · 24 saat açık</div>
    <h1>🥙 Köşedeki Späti</h1>
    <p class="sub">Kazandığın Euro'ları boss savaşlarında işine yarayacak şeylere yatır. Bakiye: <b>${S.coins} 💶</b></p>
    ${SHOP.map(s => `
      <div class="shop-item">
        <div class="shop-emoji">${s.emoji}</div>
        <div class="shop-info">
          <div class="shop-name">${s.name} <span class="own">×${S.inv[s.id]}</span></div>
          <div class="shop-desc">${s.desc}</div>
        </div>
        <button class="btn small" onclick="buy('${s.id}')" ${S.coins < s.price ? "disabled" : ""}>${s.price} 💶</button>
      </div>`).join("")}`;
}
function buy(id) {
  const s = SHOP.find(s => s.id === id);
  if (S.coins < s.price) return;
  S.coins -= s.price; S.inv[id]++;
  unlockAch("shopper"); blip("ok"); toast(`${s.emoji} ${s.name} çantada`);
  renderHUD(); renderShop(); save();
}

/* =============== BAŞARILAR =============== */
let resetArm = false;
function renderAch() {
  const L = levelInfo();
  resetArm = false;
  $("#view").innerHTML = `
    <div class="eyebrow">Erfolge</div>
    <h1>🏆 Başarılar</h1>
    <div class="card tight">
      <b>${S.name}</b> · Level ${L.lvl} ${L.title}
      <div class="sub">Toplam ${S.xp} XP · ${learnedCount()} kelime öğrenildi · Seri ${S.streak.n} gün</div>
    </div>
    ${ACH.map(a => `
      <div class="ach ${S.ach.includes(a.id) ? "" : "off"}">
        <div class="ach-emoji">${a.emoji}</div>
        <div><div class="ach-name">${a.name}</div><div class="ach-desc">${a.desc}</div></div>
        <div style="margin-left:auto">${S.ach.includes(a.id) ? "✅" : "🔒"}</div>
      </div>`).join("")}
    <h2 class="mt">💾 Kayıt</h2>
    <div class="card tight">
      <p class="sub" id="saveMode">${saveModeText()}</p>
      <div class="btn-row">
        <button class="btn ghost small" onclick="showSaveCode()">📋 Kayıt kodunu al</button>
        <button class="btn ghost small" onclick="showLoadBox()">📥 Kod yükle</button>
      </div>
      <div id="saveBox"></div>
    </div>
    <button class="btn ghost mt" id="resetBtn" onclick="resetGame()">İlerlemeyi sıfırla</button>`;
}
function resetGame() {
  if (!resetArm) {
    resetArm = true;
    $("#resetBtn").textContent = "Emin misin? Tüm ilerleme silinir. Tekrar dokun.";
    $("#resetBtn").style.borderColor = "var(--bad)";
    return;
  }
  S = freshState(); save();
  renderHUD(); renderIntro();
}

/* =============== BAŞLAT =============== */
(async function init() {
  buildWords();
  const loaded = await loadSave();
  if (loaded) S = loaded;
  renderHUD(); renderTabs();
  if (!S.intro) renderIntro(); else renderMap();
})();
</script>
